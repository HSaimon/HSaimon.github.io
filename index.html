<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hítalon Saimon — Desenvolvedor de Software, apaixonado por Java, Python, Spring Boot e soluções inovadoras." />
  <title>Hítalon Saimon — Dev Portfolio</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <!-- Stylesheets (order matters) -->  <!-- Anti-flash: apply saved theme before first paint -->
  <script>
    (function(){
      var t = localStorage.getItem('hs-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
<style>
/* ===========================
   VARIABLES & RESET
   =========================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Light theme (default) */
:root {
  --bg:       #FFFFFF;
  --bg2:      #F6F6F3;
  --bg3:      #EEEDE8;
  --accent:   #FFD700;
  --accent2:  #FFC200;
  --accent-glow: rgba(255,215,0,0.18);
  --text:     #111111;
  --muted:    #6B7280;
  --border:   rgba(255,215,0,0.22);
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --footer-bg: #111111;
  --footer-text: #9CA3AF;
  --nav-mobile-bg: rgba(255,255,255,0.97);
  --card-shadow: rgba(0,0,0,0.07);
  --input-border: rgba(0,0,0,0.1);
  --tl-border: rgba(0,0,0,0.08);
  --card-border: rgba(0,0,0,0.08);
}

/* Dark theme */
[data-theme="dark"] {
  --bg:       #07070d;
  --bg2:      #0e0e1a;
  --bg3:      #131325;
  --accent:   #FFD700;
  --accent2:  #FFC200;
  --accent-glow: rgba(255,215,0,0.13);
  --text:     #f0ede8;
  --muted:    #8a8a9a;
  --border:   rgba(255,215,0,0.12);
  --footer-bg: #05050a;
  --footer-text: #6B7280;
  --nav-mobile-bg: rgba(7,7,13,0.97);
  --card-shadow: rgba(0,0,0,0.4);
  --input-border: rgba(255,215,0,0.1);
  --tl-border: rgba(255,255,255,0.07);
  --card-border: rgba(255,215,0,0.1);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.7;
  overflow-x: hidden;
  transition: background 0.35s ease, color 0.35s ease;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

/* ===========================
   SECTION BASE STYLES
   =========================== */
section { padding: 6rem 2rem; }

.container { max-width: 1200px; margin: 0 auto; }

.s-tag {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  color: #B8950A;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 0.8rem;
}
.s-tag::before {
  content: '';
  display: inline-block;
  width: 18px; height: 2px;
  background: var(--accent2);
}

.s-title {
  font-family: var(--font-head);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.1;
  margin-bottom: 1rem;
  color: var(--text);
}

.s-sub {
  color: var(--muted);
  font-size: 0.95rem;
  max-width: 540px;
  line-height: 1.85;
}

/* Scroll reveal */
.rv { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
.rv.vis { opacity: 1; transform: none; }

/* ===========================
   NAVIGATION
   =========================== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.2rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.4s, backdrop-filter 0.4s;
}

nav.scrolled {
  background: var(--nav-mobile-bg);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
}

.nav-logo {
  font-family: var(--font-head);
  font-weight: 800;
  font-size: 1.25rem;
  color: var(--text);
  text-decoration: none;
  letter-spacing: -0.03em;
}
.nav-logo span { color: var(--accent2); }

.nav-links {
  display: flex;
  gap: 2rem;
  list-style: none;
}

.nav-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.875rem;
  font-weight: 500;
  transition: color 0.2s;
  position: relative;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0;
  width: 0; height: 1.5px;
  background: var(--accent2);
  transition: width 0.3s;
}
.nav-links a:hover { color: var(--text); }
.nav-links a:hover::after { width: 100%; }

.nav-cta {
  background: var(--accent) !important;
  color: #111111 !important;
  padding: 0.45rem 1.1rem !important;
  border-radius: 6px;
  font-weight: 700 !important;
}
.nav-cta::after { display: none !important; }

/* Hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}
.hamburger span {
  display: block;
  width: 24px; height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: all 0.3s;
}

/* ===========================
   HERO
   =========================== */
#hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 7rem 2rem 4rem;
  position: relative;
  overflow: hidden;
}

/* Decorative orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
}
.orb1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(255,215,0,0.13) 0%, transparent 70%);
  top: -150px; right: -100px;
}
.orb2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,194,0,0.09) 0%, transparent 70%);
  bottom: -50px; left: -80px;
}

.hero-grid {
  position: relative;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
}

/* Tag */
.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--accent-glow);
  border: 1px solid var(--border);
  color: #B8950A;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  padding: 0.35rem 0.85rem;
  border-radius: 100px;
  margin-bottom: 1.5rem;
}
.hero-tag::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent2);
  animation: pdot 2s infinite;
}
@keyframes pdot { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Name & Title */
.hero-name {
  font-family: var(--font-head);
  font-size: clamp(3rem, 6vw, 5.5rem);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.04em;
  margin-bottom: 0.4rem;
  color: var(--text);
}
.hero-name .last { color: var(--accent2); }

.hero-title {
  font-family: var(--font-head);
  font-size: clamp(1.1rem, 2vw, 1.5rem);
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 1.5rem;
  letter-spacing: -0.02em;
}

.hero-desc {
  color: var(--muted);
  font-size: 1rem;
  max-width: 480px;
  line-height: 1.85;
  margin-bottom: 2.5rem;
}

/* Buttons */
.hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }

.btn-primary {
  background: var(--accent);
  color: #111111;
  padding: 0.8rem 2rem;
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.875rem;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 30px var(--accent-glow);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 40px rgba(255,215,0,0.35);
}

.btn-secondary {
  background: transparent;
  color: var(--text);
  padding: 0.8rem 2rem;
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.875rem;
  text-decoration: none;
  border: 1px solid rgba(0,0,0,0.15);
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  transition: border-color 0.2s, background 0.2s;
}
.btn-secondary:hover {
  border-color: var(--accent2);
  background: var(--accent-glow);
}

/* Stats */
.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.2rem;
  margin-top: 3.5rem;
}
.stat {
  padding: 1.1rem;
  background: var(--bg2);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  text-align: center;
}
.stat-num {
  font-family: var(--font-head);
  font-size: 2rem;
  font-weight: 800;
  color: var(--accent2);
  line-height: 1;
  margin-bottom: 0.25rem;
}
.stat-label {
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* Visual / Avatar */
.hero-visual { display: flex; justify-content: center; align-items: center; }

.avatar-wrap { position: relative; width: 320px; height: 320px; }

.avatar-ring {
  position: absolute;
  inset: -22px;
  border-radius: 50%;
  border: 1px solid var(--border);
  animation: spin 18s linear infinite;
}
.avatar-ring::before {
  content: '';
  position: absolute;
  top: -4px; left: 50%;
  transform: translateX(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
}
@keyframes spin { to { transform: rotate(360deg); } }

.avatar {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  border: 2px solid rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-head);
  font-size: 5.5rem;
  font-weight: 800;
  color: var(--accent2);
}

/* Floating badges */
.float-badge {
  position: absolute;
  background: var(--bg);
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 10px;
  padding: 0.55rem 0.9rem;
  display: flex;
  align-items: center;
  gap: 0.45rem;
  font-size: 0.75rem;
  font-weight: 600;
  white-space: nowrap;
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  color: var(--text);
}
.badge1 { top: 10px; right: -30px; animation: f1 4s ease-in-out infinite; }
.badge2 { bottom: 20px; left: -40px; animation: f2 4s ease-in-out infinite; }
@keyframes f1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes f2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(8px)} }

/* ===========================
   ABOUT
   =========================== */
#about { background: var(--bg2); }

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 5rem;
  align-items: start;
}

.about-text p {
  color: var(--muted);
  line-height: 1.9;
  margin-bottom: 1.2rem;
}
.about-text p strong { color: var(--text); font-weight: 600; }

/* Timeline */
.tl-tabs { display: flex; gap: 0.75rem; margin-bottom: 2rem; }

.tl-tab {
  background: none;
  border: 1px solid transparent;
  color: var(--muted);
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 600;
  padding: 0.45rem 1rem;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.tl-tab.active {
  background: var(--accent-glow);
  color: #B8950A;
  border-color: rgba(255,215,0,0.3);
}

.tl-items { display: none; }
.tl-items.active { display: block; }

.tl-item {
  position: relative;
  padding-left: 1.8rem;
  padding-bottom: 2rem;
  border-left: 2px solid var(--tl-border);
}
.tl-item:last-child { border-left-color: transparent; padding-bottom: 0; }
.tl-item::before {
  content: '';
  position: absolute;
  left: -5px; top: 5px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px rgba(255,215,0,0.5);
}

.tl-date {
  font-size: 0.72rem;
  color: #B8950A;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.2rem;
}
.tl-role {
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 1rem;
  color: var(--text);
  margin-bottom: 0.1rem;
}
.tl-org { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.55rem; }
.tl-desc { font-size: 0.865rem; color: var(--muted); line-height: 1.75; }

/* ===========================
   PROJECTS
   =========================== */
#projects { background: var(--bg); }

.proj-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 3rem;
  flex-wrap: wrap;
  gap: 1.5rem;
}

.proj-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.4rem;
}

.proj-card {
  background: var(--bg2);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 1.7rem;
  transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
  position: relative;
  overflow: hidden;
}
.proj-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s;
}
.proj-card:hover::before { transform: scaleX(1); }
.proj-card:hover {
  transform: translateY(-5px);
  border-color: rgba(255,215,0,0.4);
  box-shadow: 0 20px 50px rgba(0,0,0,0.1);
}

.proj-icon {
  width: 46px; height: 46px;
  border-radius: 12px;
  background: var(--accent-glow);
  border: 1px solid rgba(255,215,0,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
}

.proj-name {
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 1rem;
  color: var(--text);
  line-height: 1.3;
  text-transform: capitalize;
}

.proj-desc {
  font-size: 0.855rem;
  color: var(--muted);
  line-height: 1.75;
  flex: 1;
}

.proj-langs { display: flex; flex-wrap: wrap; gap: 0.45rem; }

.lang-tag {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0.22rem 0.6rem;
  border-radius: 100px;
  border: 1px solid rgba(0,0,0,0.1);
  color: var(--muted);
  background: var(--bg3);
}

.proj-links {
  display: flex;
  gap: 0.75rem;
  padding-top: 0.5rem;
  border-top: 1px solid var(--tl-border);
}

.proj-link {
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--muted);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.3rem;
  transition: color 0.2s;
}
.proj-link:hover { color: #B8950A; }

.proj-loader { text-align: center; color: var(--muted); padding: 3rem; grid-column: 1/-1; }

.spinner {
  width: 38px; height: 38px;
  border: 3px solid var(--tl-border);
  border-top-color: var(--accent2);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}

/* Highlight card */
.proj-highlight {
  border-color: rgba(255,215,0,0.35) !important;
  box-shadow: 0 0 0 1px rgba(255,215,0,0.15), 0 8px 32px rgba(0,0,0,0.08);
}
[data-theme="dark"] .proj-highlight {
  box-shadow: 0 0 0 1px rgba(255,215,0,0.2), 0 8px 32px rgba(0,0,0,0.4);
}

/* ===========================
   SKILLS
   =========================== */
#skills { background: var(--bg2); }

.sk-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 1rem;
  margin-top: 2.5rem;
}

.sk-card {
  background: var(--bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 1.3rem 1.1rem;
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
}
.sk-card:hover {
  transform: translateY(-4px);
  border-color: rgba(255,215,0,0.4);
  box-shadow: 0 8px 24px rgba(0,0,0,0.07);
}

.sk-emoji { font-size: 1.75rem; }

.sk-name {
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 0.88rem;
  color: var(--text);
}

.sk-lv {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.sk-lv.av { color: #16a34a; }
.sk-lv.in { color: #B8950A; }
.sk-lv.ini { color: var(--muted); }

.sk-bar {
  height: 3px;
  background: var(--tl-border);
  border-radius: 10px;
  overflow: hidden;
}
.sk-fill {
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 1.1s ease;
}

/* ===========================
   CONTACT
   =========================== */
#contact { background: var(--bg); }

.ct-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: start;
}

.ct-links { display: flex; flex-direction: column; gap: 0.9rem; margin-top: 2rem; }

.ct-link {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.3rem;
  background: var(--bg2);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  text-decoration: none;
  transition: border-color 0.2s, transform 0.2s, background 0.2s;
}
.ct-link:hover {
  border-color: rgba(255,215,0,0.4);
  transform: translateX(5px);
  background: var(--bg3);
}

.ct-icon {
  width: 40px; height: 40px;
  border-radius: 9px;
  background: var(--accent-glow);
  border: 1px solid rgba(255,215,0,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.ct-txt strong {
  display: block;
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.1rem;
}
.ct-txt span { font-size: 0.76rem; color: var(--muted); }

/* Form */
.ct-form { display: flex; flex-direction: column; gap: 1rem; }

.f-grp { display: flex; flex-direction: column; gap: 0.4rem; }

.f-grp label {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.f-grp input, .f-grp textarea {
  background: var(--bg2);
  border: 1px solid var(--input-border);
  border-radius: 8px;
  padding: 0.8rem 1rem;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.875rem;
  transition: border-color 0.2s;
  outline: none;
  resize: none;
}
.f-grp input:focus, .f-grp textarea:focus { border-color: var(--accent2); }
.f-grp textarea { min-height: 115px; }

.f-submit {
  background: var(--accent);
  color: #111111;
  border: none;
  padding: 0.85rem 2rem;
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.875rem;
  font-family: var(--font-body);
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
  align-self: flex-start;
}
.f-submit:hover { opacity: 0.85; transform: translateY(-2px); }

/* ===========================
   FOOTER
   =========================== */
footer {
  background: var(--footer-bg);
  border-top: 1px solid rgba(255,215,0,0.15);
  padding: 2.2rem 2rem;
}

.ft-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}
